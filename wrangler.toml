name = "escribus"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "firmas.tuperiodico.soy", custom_domain = true }
]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1


# Bindings configurados en el dashboard:
# - D1: DB → lemma-db
# - Secret: TELEGRAM_TOKEN
# - Secret: TELEGRAM_CHAT_ID
